<!DOCTYPE html>
<html>
<head>
    <title>Sokoban with Emscripten</title>
    <style>
        body { font-family: monospace; }
		#game-board {
			display: grid;
			/* This will dynamically create columns based on the number of columns in your game */
			grid-template-columns: repeat(var(--cols), 20px); 
			line-height: initial; /* Reset the line-height */
		}
        .tile {
			display: block;
            width: 20px;
            height: 20px;
            font-size: 16px;
            text-align: center;
            vertical-align: top;
            box-sizing: border-box;
            background-color: #f0f0f0;
        }
        .tile.wall { background-color: #444; color: #fff; }
        .tile.player { background-color: #f0f0f0; color: #00f; }
        .tile.box { background-color: #f0f0f0; color: #d70; }
        .tile.goal { background-color: #ffc; border: 1px solid #d70; }
        .tile.player-on-goal { background-color: #ffc; color: #00f; }
        .tile.box-on-goal { background-color: #ffc; color: #d70; }
        .tile.ice { background-color: #cff; color: #eee; }
        .tile.player-on-ice { background-color: #cff; color: #00f; }
        .tile.box-on-ice { background-color: #cff; color: #d70; }
    </style>
</head>
<body>
    <div id="game-board"></div>
    <div id="status"></div>
    <script src="sokoban.js"></script>
    <script>
        const levelData = `
################
#@     ~~~~~"~   
#$* #   ~"~ 
#.  #    ~
#####
`;

        const eventTicTime = 100;
        const boardElement = document.getElementById('game-board');
        const statusElement = document.getElementById('status');
        let c_sokoban_init;
        let c_sokoban_handle_input;
        let c_sokoban_get_rows;
        let c_sokoban_get_cols;
        let c_sokoban_get_tile;
        let c_sokoban_is_game_won;

        Module.onRuntimeInitialized = () => {
            // C-wrappers for the exported functions
            c_sokoban_init = Module.cwrap('sokoban_init_web', null, ['string']);
            c_sokoban_handle_input = Module.cwrap('sokoban_handle_input', 'boolean', ['number']);
            c_sokoban_is_event_ongoing = Module.cwrap('sokoban_is_event_ongoing', 'boolean', []);
            c_sokoban_process_event = Module.cwrap('sokoban_process_event', 'boolean', []);
            c_sokoban_get_rows = Module.cwrap('sokoban_get_rows', 'number', []);
            c_sokoban_get_cols = Module.cwrap('sokoban_get_cols', 'number', []);
            c_sokoban_get_tile = Module.cwrap('sokoban_get_tile', 'number', ['number', 'number']);
            c_sokoban_is_game_won = Module.cwrap('sokoban_is_game_won', 'boolean', []);
		
            initGame();
            window.addEventListener('keydown', handleKeyPress);
        };

        function initGame() {
            c_sokoban_init(levelData.trim());
            drawBoard();
        }

        function drawBoard() {
            boardElement.innerHTML = '';
            const rows = c_sokoban_get_rows();
            const cols = c_sokoban_get_cols();
			
			// Set the CSS custom property for the grid columns
			boardElement.style.setProperty('--cols', cols);
	
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const tileChar = String.fromCharCode(c_sokoban_get_tile(i, j));
                    const tileDiv = document.createElement('div');
                    tileDiv.classList.add('tile');
                    tileDiv.textContent = tileChar;

                    switch (tileChar) {
                        case '#': tileDiv.classList.add('wall'); break;
                        case '@': tileDiv.classList.add('player'); break;
                        case '+': tileDiv.classList.add('player-on-goal'); break;
                        case '&': tileDiv.classList.add('player-on-ice'); break;
                        case '$': tileDiv.classList.add('box'); break;
                        case '*': tileDiv.classList.add('box-on-goal'); break;
                        case '"': tileDiv.classList.add('box-on-ice'); break;
                        case '.': tileDiv.classList.add('goal'); break;
                        case ' ': tileDiv.classList.add('floor'); break;
                        case '~': tileDiv.classList.add('ice'); break;
                    }
                    boardElement.appendChild(tileDiv);
                }
            }
            if (c_sokoban_is_game_won()) {
                statusElement.textContent = "Congratulations! You won!";
            } else {
                statusElement.textContent = "";
            }
        }
		
		function handleEventProgression() {
		  if (c_sokoban_process_event()) {
		    drawBoard();
		  }
		  if (c_sokoban_is_event_ongoing()) {
		    setTimeout(handleEventProgression, eventTicTime);
		  }
		}

        function handleKeyPress(event) {
			if (c_sokoban_is_event_ongoing()) {
				return; // ignore input while an event is ongoing
			}
            let inputChar = '';
            switch (event.key) {
                case 'ArrowUp':
                case 'w':
                    inputChar = 'w';
                    break;
                case 'ArrowDown':
                case 's':
                    inputChar = 's';
                    break;
                case 'ArrowLeft':
                case 'a':
                    inputChar = 'a';
                    break;
                case 'ArrowRight':
                case 'd':
                    inputChar = 'd';
                    break;
                case 'u':
                    inputChar = 'u';
                    break;
                case 'r':
                    inputChar = 'r';
                    break;
                default:
                    return;
            }
            if (c_sokoban_handle_input(inputChar.charCodeAt(0))) {
              drawBoard();
			}
			// if the action triggers an event, set in motion the timers to process it
			if (c_sokoban_is_event_ongoing()) {
			  setTimeout(handleEventProgression, eventTicTime);
			}
        }
    </script>
</body>
</html>
