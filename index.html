<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sokoban</title>
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            background: #10171c;
            color: #f6edd3;
            font-family: monospace;
        }

        body {
            display: grid;
            grid-template-rows: 1fr auto;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: #10171c;
        }

        .fallback {
            padding: 0.65rem 0.9rem;
            text-align: center;
            background: #182127;
            border-top: 1px solid rgba(217, 164, 65, 0.25);
        }

        .fallback[hidden] {
            display: none;
        }

        .fallback a {
            color: #ffe066;
        }
    </style>
</head>
<body>
    <iframe id="game-frame" data-base-src="web/index.html" title="Sokoban" tabindex="-1"></iframe>
    <div id="fallback" class="fallback" hidden>
        If the embedded game does not load, open <a id="fallback-link" href="web/index.html">the web frontend directly</a>.
    </div>
    <script>
        const frame = document.getElementById('game-frame');
        const fallback = document.getElementById('fallback');
        const fallbackLink = document.getElementById('fallback-link');
        let loaded = false;

        function buildEmbeddedGameUrl() {
            const embeddedUrl = new URL(frame.dataset.baseSrc, window.location.href);

            embeddedUrl.search = window.location.search;
            return embeddedUrl;
        }

        function restoreGameFocus() {
            if (!loaded) {
                return;
            }

            try {
                if (frame.contentWindow && typeof frame.contentWindow.focusGameplaySurface === 'function') {
                    if (frame.contentWindow.focusGameplaySurface()) {
                        return;
                    }
                    return;
                }
            } catch (error) {
                // Ignore focus recovery failures and fall back to focusing the frame itself.
            }

            frame.focus();
            try {
                if (frame.contentWindow) {
                    frame.contentWindow.focus();
                }
            } catch (error) {
                // Ignore focus recovery failures and leave the frame itself focused.
            }
        }

        const fallbackTimer = window.setTimeout(() => {
            if (!loaded) {
                fallback.hidden = false;
            }
        }, 3000);

        frame.addEventListener('load', () => {
            loaded = true;
            fallback.hidden = true;
            window.clearTimeout(fallbackTimer);
            window.setTimeout(restoreGameFocus, 0);
        });

        frame.addEventListener('error', () => {
            fallback.hidden = false;
            window.clearTimeout(fallbackTimer);
        });

        window.addEventListener('focus', () => {
            window.setTimeout(restoreGameFocus, 0);
        });

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                window.setTimeout(restoreGameFocus, 0);
            }
        });

        const embeddedGameUrl = buildEmbeddedGameUrl();

        fallbackLink.href = embeddedGameUrl.toString();
        frame.src = embeddedGameUrl.toString();
    </script>
</body>
</html>
